<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- TODO: add icon -->
    <!-- <link rel="icon" type="image/svg+xml" href="/vite.svg" /> -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function (location) {
        if (!location.search.startsWith("?/")) return;

        const decodedPath = location.search
          .slice(1)
          .split("&")
          .map((part) => part.replace(/~and~/g, "&"))
          .join("?");

        window.history.replaceState(
          null,
          "",
          location.pathname.replace(/\/$/, "") + decodedPath + location.hash,
        );
      })(window.location);
    </script>
    <title>master-mystery</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
