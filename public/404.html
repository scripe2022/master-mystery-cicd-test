<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>master-mystery</title>
    <script>
      (function (location) {
        const segmentCount = 1;
        const origin =
          location.protocol + "//" + location.hostname + (location.port ? ":" + location.port : "");
        const basePath =
          location.pathname
            .split("/")
            .slice(0, 1 + segmentCount)
            .join("/") + "/";
        const routePath = location.pathname
          .slice(1)
          .split("/")
          .slice(segmentCount)
          .join("/")
          .replace(/&/g, "~and~");
        const query = location.search ? "&" + location.search.slice(1).replace(/&/g, "~and~") : "";

        location.replace(origin + basePath + "?" + "/" + routePath + query + location.hash);
      })(window.location);
    </script>
  </head>
  <body></body>
</html>
